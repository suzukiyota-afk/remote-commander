<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0f1e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Commander" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<title>Remote Commander</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<canvas id="bg"></canvas>
<div id="bg-grid"></div>

<aside id="drawer" class="drawer">
  <div class="drawer-head">
    <span class="brand-mark">◆</span>
    <span>COMMANDER</span>
    <button id="drawerClose" class="icon-btn" aria-label="close">×</button>
  </div>

  <div class="drawer-section">
    <div class="section-label">WORKSPACE</div>
    <div id="workspaceGrid" class="workspace-grid"></div>
    <input id="cwdCustom" class="cwd-custom" placeholder="custom path…" autocomplete="off" spellcheck="false" />
  </div>

  <div class="drawer-section">
    <div class="section-label">SESSIONS</div>
    <button id="newSession" class="new-session">＋ new session</button>
    <ul id="sessionList" class="session-list"></ul>
  </div>

  <div class="drawer-section">
    <div class="section-label">RECENT JOBS</div>
    <ul id="jobList" class="job-list"></ul>
  </div>

  <div class="drawer-section">
    <div class="section-label">
      SKILLS <span id="skillCount" class="muted"></span>
      <button id="skillToggle" class="skill-toggle" type="button">all</button>
    </div>
    <input id="skillSearch" class="cwd-custom" placeholder="filter skills…" autocomplete="off" spellcheck="false" />
    <div id="skillGrid" class="skill-grid"></div>
  </div>

  <div class="drawer-foot">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">connecting…</span>
  </div>
</aside>

<main id="app">
  <header class="topbar">
    <button id="drawerOpen" class="icon-btn" aria-label="menu">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="title">
      <span class="brand-mark">◆</span>
      <span class="brand-text">REMOTE<span class="accent">/</span>COMMANDER</span>
    </div>
    <button id="cancelBtn" class="icon-btn cancel-btn" aria-label="cancel" title="cancel running job" hidden>
      <svg viewBox="0 0 24 24" width="18" height="18"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
    </button>
  </header>
  <div class="subbar">
    <span class="cwd-chip" id="cwdChip">▣ ロジ</span>
    <span class="session-chip" id="sessionChip">new</span>
    <span class="job-chip" id="jobChip" hidden></span>
  </div>

  <section id="log" class="log" aria-live="polite"></section>

  <form id="composer" class="composer" autocomplete="off">
    <div class="attachments" id="attachments"></div>
    <div class="composer-row">
      <label class="icon-btn attach" for="fileInput" aria-label="attach">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M21 11.5a5.5 5.5 0 1 1-11 0V6a3.5 3.5 0 1 1 7 0v5.5a1.5 1.5 0 1 1-3 0V7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
        <input type="file" id="fileInput" accept="image/*" hidden />
      </label>
      <textarea id="prompt" rows="1" placeholder="prompt…" spellcheck="false"></textarea>
      <button id="send" type="submit" class="send" aria-label="send">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 12l16-8-6 18-2-8-8-2z" fill="currentColor"/></svg>
      </button>
    </div>
  </form>
</main>

<script type="importmap">
{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>
<script type="module" src="/bg.js"></script>
<script src="/app.js" defer></script>
</body>
</html>
